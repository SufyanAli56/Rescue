<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#gradient)"/>
  
  <!-- Emergency Cross -->
  <rect x="216" y="96" width="80" height="320" rx="12" fill="white"/>
  <rect x="96" y="216" width="320" height="80" rx="12" fill="white"/>
  
  <!-- Inner Circle for depth -->
  <circle cx="256" cy="256" r="140" fill="url(#innerGradient)" opacity="0.3"/>
  
  <!-- Pulse rings -->
  <circle cx="256" cy="256" r="200" stroke="white" stroke-width="8" fill="none" opacity="0.2"/>
  <circle cx="256" cy="256" r="220" stroke="white" stroke-width="6" fill="none" opacity="0.1"/>
  
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="innerGradient">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>
